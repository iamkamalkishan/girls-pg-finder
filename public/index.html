<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e91e8c" />
  <meta name="description" content="SheStay - Safe PG & Hostel finder for girls and working women. Verified listings by owners." />
  <title>SheStay — Girls PG & Hostel Finder</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Firebase (optional Google login). Configure in firebase-config.js -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="logo">🛡️ SheStay</div>
    <div class="tagline">Safe stays for her</div>
    <button id="authBtn" class="auth-btn">Login</button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="search">🔍 Find</button>
    <button class="tab" data-tab="map">📍 Near Me</button>
    <button class="tab" data-tab="list">❤️ Saved</button>
    <button class="tab" data-tab="owner">🏠 My PGs</button>
  </nav>

  <main>
    <!-- SEARCH TAB -->
    <section id="search" class="tab-content active">
      <div class="filters">
        <input type="text" id="cityInput" placeholder="City (e.g. Mumbai)" />
        <input type="text" id="areaInput" placeholder="Area (optional)" />
        <div class="row">
          <input type="number" id="minPrice" placeholder="Min ₹" />
          <input type="number" id="maxPrice" placeholder="Max ₹" />
        </div>
        <div class="row">
          <select id="typeFilter"><option value="">All Types</option><option value="PG">PG</option><option value="Hostel">Hostel</option></select>
          <select id="sortFilter"><option value="rating">Sort: Rating</option><option value="price_asc">Price: Low-High</option><option value="price_desc">Price: High-Low</option></select>
        </div>
        <label class="check"><input type="checkbox" id="safetyFilter" /> ✅ Safety Verified only</label>
        <label class="check"><input type="checkbox" id="foodFilter" /> 🍱 Food included</label>
        <button class="btn-primary" id="searchBtn">Search PGs</button>
      </div>
      <div id="results" class="results"></div>
    </section>

    <!-- MAP TAB -->
    <section id="map" class="tab-content">
      <div class="info-box">
        <p>📍 Share your location to find PGs near you.</p>
        <button class="btn-primary" id="locBtn">Use My Location</button>
        <div id="nearResults" class="results"></div>
      </div>
    </section>

    <!-- SAVED TAB -->
    <section id="list" class="tab-content">
      <h3>Saved PGs</h3>
      <div id="savedResults" class="results"></div>
    </section>

    <!-- OWNER TAB -->
    <section id="owner" class="tab-content">
      <div id="ownerLoggedOut">
        <div class="info-box">
          <h3>Owner Panel</h3>
          <p>Login to manage your PG listings.</p>
          <button class="btn-primary" onclick="openAuth()">Owner Login / Signup</button>
        </div>
      </div>
      <div id="ownerLoggedIn" style="display:none">
        <h3>My PG Listings</h3>
        <button class="btn-primary" id="addPgBtn" style="margin-bottom:12px">➕ Add New PG</button>
        <div id="ownerPgs" class="results"></div>
        <h3 style="margin-top:16px">Inquiries from Customers</h3>
        <div id="ownerInquiries" class="results"></div>
        <button class="btn-primary" id="logoutBtn" style="background:#888;margin-top:12px;width:100%">Logout</button>
      </div>
    </section>
  </main>

  <!-- AUTH MODAL -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeAuth()">&times;</span>
      <h2>Owner Access</h2>
      <input type="text" id="authName" placeholder="Your Name" style="margin-top:8px" />
      <input type="email" id="authEmail" placeholder="Email" style="margin-top:8px" />
      <input type="password" id="authPassword" placeholder="Password (min 6 chars)" style="margin-top:8px" />
      <button class="btn-primary" id="loginBtn" style="margin-top:12px;width:100%">Login</button>
      <button class="btn-primary" id="signupBtn" style="background:#7b2ff7;margin-top:8px;width:100%">Sign Up</button>
      <div id="firebaseZone" style="margin-top:12px;border-top:1px solid #eee;padding-top:12px">
        <button id="googleBtn" class="btn-primary" style="background:#fff;color:#444;border:1px solid #ccc;width:100%">🔵 Continue with Google</button>
        <small style="color:#888">Enable in firebase-config.js with your Firebase keys</small>
      </div>
      <p id="authError" style="color:#e91e8c;margin-top:8px"></p>
    </div>
  </div>

  <!-- ADD/EDIT PG MODAL -->
  <div id="pgModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closePgModal()">&times;</span>
      <h2 id="pgModalTitle">Add PG</h2>
      <input type="text" id="pg_name" placeholder="PG / Hostel Name" style="margin-top:8px" />
      <div class="row">
        <input type="text" id="pg_city" placeholder="City" />
        <input type="text" id="pg_area" placeholder="Area" />
      </div>
      <div class="row">
        <input type="number" id="pg_price" placeholder="Monthly ₹" />
        <select id="pg_type"><option value="PG">PG</option><option value="Hostel">Hostel</option></select>
      </div>
      <input type="text" id="pg_sharing" placeholder="Sharing (e.g. 2 Sharing)" style="margin-top:8px" />
      <input type="text" id="pg_phone" placeholder="Contact Phone" style="margin-top:8px" />
      <textarea id="pg_address" placeholder="Full Address" style="margin-top:8px"></textarea>
      <textarea id="pg_amenities" placeholder="Amenities (comma separated): WiFi, AC, CCTV" style="margin-top:8px"></textarea>
      <textarea id="pg_rules" placeholder="Rules" style="margin-top:8px"></textarea>
      <label class="check" style="margin-top:8px"><input type="checkbox" id="pg_food" /> 🍱 Food included</label>
      <button class="btn-primary" id="savePgBtn" style="margin-top:12px;width:100%">Save Listing</button>
      <p id="pgError" style="color:#e91e8c"></p>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close" id="modalClose">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
